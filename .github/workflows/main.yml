name: Docker CI

on:
    push:
        branches:
            - main

jobs:
    docker:
        runs-on: ubuntu-latest
        env:
            DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
            GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
            CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        steps:
            - name: Cloning Repository
              uses: actions/checkout@v4

            - name: Debug secrets (masked-safe, no values printed)
              run: |
                echo "--- runner env ---"
                for v in DATABASE_URL JWT_SECRET_KEY GOOGLE_CLIENT_ID CLOUDINARY_CLOUD_NAME CLOUDINARY_API_KEY CLOUDINARY_API_SECRET DOCKER_USERNAME; do
                  if [ -z "${!v}" ]; then echo "$v = MISSING"; else echo "$v = set (len ${#v})"; fi
                done
                echo "--- DATABASE_URL sanity ---"
                echo "scheme = ${DATABASE_URL%%://*}"
                case "$DATABASE_URL" in
                  postgresql://*) echo "prefix: OK" ;;
                  "") echo "prefix: EMPTY" ;;
                  *) echo "prefix: UNEXPECTED (not postgresql://)" ;;
                esac
                case "$DATABASE_URL" in
                  *require) echo "suffix: OK (ends in ...require)" ;;
                  *) echo "suffix: BAD — trailing newline/space/quote?" ;;
                esac

            - name: Building Containers
              run: docker compose up -d --build

            - name: Debug container env (what the backend actually gets)
              run: docker compose run --rm --entrypoint sh backend -c 'echo "container: len=${#DATABASE_URL} scheme=${DATABASE_URL%%://*}"'

            - name: Container Status
              run: docker ps

            - name: Checking Backend
              run: |
                for i in $(seq 1 15); do
                  if curl -fs http://localhost:8000/health >/dev/null; then
                    echo "Backend Working"; exit 0
                  fi
                  echo "waiting for backend... ($i)"; sleep 2
                done
                echo "Backend Failed"; docker compose logs backend; exit 1

            - name: Login to DockerHub
              uses: docker/login-action@v3 
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Push images
              run: |
                docker push "${{ secrets.DOCKER_USERNAME }}/blogsphere-frontend:latest"
                docker push "${{ secrets.DOCKER_USERNAME }}/blogsphere-backend:latest"

            - name: Closing Containers
              run: docker compose down
